  - id: 35
    category: spring_implementation
    name: "Caching Strategy"
    phase: phase2_coding
    severity: low
    description: "Implement caching for frequently accessed data"
    detector:
      type: code_review
      heuristics:
        - "Identify cacheable operations"
        - "Verify @Cacheable annotations"
        - "Check cache configuration"
    remediation:
      strategy: "Use Spring Cache abstraction"
      example: |
        @Service
        public class CustomerService {
          
          @Cacheable(value = "customers", key = "#id")
          public Customer getCustomer(Long id) {
            return customerRepository.findById(id)
              .orElseThrow(() -> new CustomerNotFoundException(id));
          }
          
          @CacheEvict(value = "customers", key = "#customer.id")
          public void updateCustomer(Customer customer) {
            customerRepository.save(customer);
          }
        }

  - id: 36
    category: architecture
    name: "Async Processing Design"
    phase: phase1_design
    severity: medium
    description: "Design asynchronous processing for long-running operations"
    detector:
      type: manual_review
      heuristics:
        - "Identify long-running TIBCO processes"
        - "Determine async processing requirements"
        - "Plan for callback mechanisms"
    remediation:
      strategy: "Use @Async for asynchronous operations"
      example: |
        @Service
        public class OrderProcessingService {
          
          @Async
          public CompletableFuture<OrderResult> processOrderAsync(Order order) {
            // Long-running processing
            OrderResult result = processOrder(order);
            return CompletableFuture.completedFuture(result);
          }
        }

  - id: 37
    category: spring_implementation
    name: "Circuit Breaker Implementation"
    phase: phase2_coding
    severity: medium
    description: "Implement circuit breaker for external service calls"
    detector:
      type: code_review
      heuristics:
        - "Identify external service dependencies"
        - "Check for Resilience4j usage"
        - "Verify fallback methods"
    remediation:
      strategy: "Use Resilience4j circuit breaker"
      example: |
        @Service
        public class PaymentService {
          
          @CircuitBreaker(name = "paymentService", fallbackMethod = "fallbackPayment")
          public PaymentResponse processPayment(PaymentRequest request) {
            return paymentClient.process(request);
          }
          
          private PaymentResponse fallbackPayment(PaymentRequest request, Exception ex) {
            log.error("Payment service unavailable", ex);
            return PaymentResponse.failed("Service temporarily unavailable");
          }
        }

