  - id: 31
    category: spring_implementation
    name: "Security Configuration"
    phase: phase2_coding
    severity: high
    description: "Implement Spring Security for authentication and authorization"
    detector:
      type: code_review
      heuristics:
        - "Verify SecurityConfig class exists"
        - "Check authentication mechanism"
        - "Validate authorization rules"
    remediation:
      strategy: "Configure Spring Security with appropriate authentication"
      example: |
        @Configuration
        @EnableWebSecurity
        public class SecurityConfig {
          
          @Bean
          public SecurityFilterChain filterChain(HttpSecurity http) {
            http
              .authorizeHttpRequests(auth -> auth
                .requestMatchers("/api/public/**").permitAll()
                .requestMatchers("/api/admin/**").hasRole("ADMIN")
                .anyRequest().authenticated()
              )
              .oauth2ResourceServer(OAuth2ResourceServerConfigurer::jwt);
            return http.build();
          }
        }

