  - id: 41
    category: testing
    name: "Integration Test Suite"
    phase: phase4_testing
    severity: high
    description: "Create comprehensive integration tests"
    detector:
      type: test_review
      heuristics:
        - "Verify @SpringBootTest usage"
        - "Check end-to-end test scenarios"
        - "Validate test data setup"
    remediation:
      strategy: "Write integration tests covering main flows"
      example: |
        @SpringBootTest(webEnvironment = WebEnvironment.RANDOM_PORT)
        @AutoConfigureTestDatabase
        class OrderIntegrationTest {
          
          @Autowired
          private TestRestTemplate restTemplate;
          
          @Test
          void createAndRetrieveOrder_Success() {
            OrderRequest request = new OrderRequest();
            
            ResponseEntity<OrderResponse> createResponse = 
              restTemplate.postForEntity("/api/v1/orders", request, OrderResponse.class);
            
            assertEquals(HttpStatus.CREATED, createResponse.getStatusCode());
            
            Long orderId = createResponse.getBody().getId();
            ResponseEntity<OrderResponse> getResponse = 
              restTemplate.getForEntity("/api/v1/orders/" + orderId, OrderResponse.class);
            
            assertEquals(HttpStatus.OK, getResponse.getStatusCode());
          }
        }

