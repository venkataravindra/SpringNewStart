            .baseUrl("http://localhost:8080")
            .acceptHeader("application/json")
          
          val scn = scenario("Create Orders")
            .exec(http("Create Order")
              .post("/api/v1/orders")
              .body(StringBody("""{"customerId": 1}"""))
              .check(status.is(201)))
          
